<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Tools</title>
  <style>
    :root {
      --nav:    #1a1a2e;
      --accent: #0d6efd;
      --border: #e0e4ea;
      --bg:     #f0f2f5;
      --header-h: 56px;
    }
    /* --nav is overridden by JS once /api/mode responds */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      background: var(--nav);
    }

    /* ── Header ──────────────────────────────────────────────────── */
    header {
      height: var(--header-h);
      background: var(--nav);
      color: #fff;
      display: flex;
      align-items: stretch;
      padding: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }


    /* ── Tab bar ─────────────────────────────────────────────────── */
    .tab-bar {
      display: flex;
      align-items: stretch;
      height: 100%;
      padding-left: 8px;
    }

    .tab {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 18px;
      height: 100%;
      cursor: pointer;
      font-size: .82rem;
      font-weight: 500;
      color: rgba(255,255,255,.45);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s, background .15s;
      white-space: nowrap;
      position: relative;
      letter-spacing: .01em;
    }

    .tab:hover {
      color: rgba(255,255,255,.8);
      background: rgba(255,255,255,.05);
    }

    .tab.active {
      color: #fff;
      border-bottom-color: var(--accent);
      font-weight: 600;
    }

    .tab-icon {
      font-size: 1rem;
      line-height: 1;
    }

    /* ── Version label ───────────────────────────────────────────── */
    .hdr-version {
      margin-left: auto;
      padding-right: 16px;
      font-size: .72rem;
      color: rgba(255,255,255,.35);
      white-space: nowrap;
      align-self: center;
    }

    /* ── Update banner ───────────────────────────────────────────── */
    #update-banner {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: #f1f5f9;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: .84rem;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,.3);
      z-index: 1000;
    }
    #update-banner button {
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 4px 10px;
      font-size: .82rem;
      cursor: pointer;
    }
    #update-banner button:hover { background: #2563eb; }
    #update-banner button.dismiss {
      background: transparent;
      color: #94a3b8;
      padding: 2px 4px;
      font-size: .9rem;
    }
    #update-banner button.dismiss:hover { color: #f1f5f9; }

    /* ── iframe wrapper ──────────────────────────────────────────── */
    .frame-wrap {
      height: calc(100vh - var(--header-h));
      position: relative;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
      background: var(--bg);
    }
  </style>
</head>
<body>

  <header>
    <nav class="tab-bar" role="tablist">
      <button class="tab" id="tab-optilayer" role="tab" onclick="switchTab('optilayer')">
        <span class="tab-icon">🔬</span>
        Optilayer Indexer
      </button>
      <button class="tab" id="tab-recipeeditor" role="tab" onclick="switchTab('recipeeditor')">
        <span class="tab-icon">📋</span>
        Recipe Editor
      </button>
    </nav>
    <span class="hdr-version" id="hdr-version"></span>
  </header>

  <div class="frame-wrap">
    <iframe id="tool-frame" title="Tool"></iframe>
  </div>

  <script>
    const TABS = {
      optilayer:    { url: '/optilayer/',    label: 'Optilayer Indexer' },
      recipeeditor: { url: '/recipeeditor/', label: 'Recipe Editor' },
    };

    function switchTab(id) {
      if (!TABS[id]) return;

      // Update hash (triggers hashchange but we guard re-entry)
      if (location.hash !== '#' + id) {
        history.replaceState(null, '', '#' + id);
      }

      // Update tab active states
      document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
      document.getElementById('tab-' + id).classList.add('active');

      // Load iframe
      const frame = document.getElementById('tool-frame');
      const target = TABS[id].url;
      if (frame.src !== location.origin + target) {
        frame.src = target;
      }

      document.title = TABS[id].label + ' — Design Tools';
    }

    function resolveTab() {
      const hash = location.hash.replace('#', '');
      return TABS[hash] ? hash : 'optilayer';
    }

    window.addEventListener('hashchange', () => switchTab(resolveTab()));

    // Apply nav colour based on work/live mode
    const NAV_COLORS = {
      live: '#1a3a8f',  // deep royal blue
      work: '#6e1a1a',  // dark red
    };
    fetch('/api/mode').then(r => r.json()).then(data => {
      const color = NAV_COLORS[data.mode];
      if (color) document.documentElement.style.setProperty('--nav', color);
    }).catch(() => {});

    // Init
    switchTab(resolveTab());

    // ── Update check ─────────────────────────────────────────────
    let _pageVersion = null;

    async function checkForUpdate() {
      try {
        const r = await fetch('/api/version');
        if (!r.ok) return;
        const { mtime, label } = await r.json();
        if (_pageVersion === null) {
          _pageVersion = mtime;
          document.getElementById('hdr-version').textContent = label;
        } else if (mtime !== _pageVersion) {
          showUpdateBanner(label);
        }
      } catch (_) {}
    }

    function showUpdateBanner(label) {
      if (document.getElementById('update-banner')) return;
      const banner = document.createElement('div');
      banner.id = 'update-banner';
      banner.innerHTML =
        `Page updated (${label}) — <button onclick="location.reload()">Reload</button>` +
        `<button class="dismiss" onclick="this.parentElement.remove()" title="Dismiss">✕</button>`;
      document.body.appendChild(banner);
    }

    checkForUpdate();
    setInterval(checkForUpdate, 30 * 1000);
  </script>
</body>
</html>
