<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Tools</title>
  <style>
    :root {
      --nav:    #1a1a2e;
      --accent: #0d6efd;
      --border: #e0e4ea;
      --bg:     #f0f2f5;
      --header-h: 56px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      background: var(--nav);
    }

    /* ── Header ──────────────────────────────────────────────────── */
    header {
      height: var(--header-h);
      background: var(--nav);
      color: #fff;
      display: flex;
      align-items: stretch;
      padding: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }


    /* ── Tab bar ─────────────────────────────────────────────────── */
    .tab-bar {
      display: flex;
      align-items: stretch;
      height: 100%;
      padding-left: 8px;
    }

    .tab {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 18px;
      height: 100%;
      cursor: pointer;
      font-size: .82rem;
      font-weight: 500;
      color: rgba(255,255,255,.45);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s, background .15s;
      white-space: nowrap;
      position: relative;
      letter-spacing: .01em;
    }

    .tab:hover {
      color: rgba(255,255,255,.8);
      background: rgba(255,255,255,.05);
    }

    .tab.active {
      color: #fff;
      border-bottom-color: var(--accent);
      font-weight: 600;
    }

    .tab-icon {
      font-size: 1rem;
      line-height: 1;
    }

    /* ── iframe wrapper ──────────────────────────────────────────── */
    .frame-wrap {
      height: calc(100vh - var(--header-h));
      position: relative;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
      background: var(--bg);
    }
  </style>
</head>
<body>

  <header>
    <nav class="tab-bar" role="tablist">
      <button class="tab" id="tab-optilayer" role="tab" onclick="switchTab('optilayer')">
        <span class="tab-icon">🔬</span>
        Optilayer Indexer
      </button>
      <button class="tab" id="tab-recipeeditor" role="tab" onclick="switchTab('recipeeditor')">
        <span class="tab-icon">📋</span>
        Recipe Editor
      </button>
    </nav>
  </header>

  <div class="frame-wrap">
    <iframe id="tool-frame" title="Tool"></iframe>
  </div>

  <script>
    const TABS = {
      optilayer:    { url: '/optilayer/',    label: 'Optilayer Indexer' },
      recipeeditor: { url: '/recipeeditor/', label: 'Recipe Editor' },
    };

    function switchTab(id) {
      if (!TABS[id]) return;

      // Update hash (triggers hashchange but we guard re-entry)
      if (location.hash !== '#' + id) {
        history.replaceState(null, '', '#' + id);
      }

      // Update tab active states
      document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
      document.getElementById('tab-' + id).classList.add('active');

      // Load iframe
      const frame = document.getElementById('tool-frame');
      const target = TABS[id].url;
      if (frame.src !== location.origin + target) {
        frame.src = target;
      }

      document.title = TABS[id].label + ' — Design Tools';
    }

    function resolveTab() {
      const hash = location.hash.replace('#', '');
      return TABS[hash] ? hash : 'optilayer';
    }

    window.addEventListener('hashchange', () => switchTab(resolveTab()));

    // Init
    switchTab(resolveTab());
  </script>
</body>
</html>
