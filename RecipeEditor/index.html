<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
</head>

<body>
  <header>
    <div class="hdr-title">
      <p>Deposition sequence viewer</p>
    </div>
    <div style="flex:1"></div>
    <input type="file" id="lpr-file-input" accept=".LPR,.lpr" style="display:none">
    <button class="btn-import" onclick="document.getElementById('lpr-file-input').click()">Import LPR</button>
    <button class="btn-ghost" onclick="openSettings()" style="margin-left:6px;" title="Import settings">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="10" cy="10" r="3"/>
        <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M4.22 15.78l1.42-1.42M14.36 5.64l1.42-1.42"/>
      </svg>
    </button>
  </header>

  <!-- Settings overlay -->
  <div class="settings-overlay" id="settings-overlay" onclick="overlayClick(event)">
    <div class="settings-panel">
      <div class="settings-header">
        <h2>Settings</h2>
        <button class="btn-close-settings" onclick="closeSettings()" title="Close">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="2" y1="2" x2="12" y2="12"/><line x1="12" y1="2" x2="2" y2="12"/>
          </svg>
        </button>
      </div>
      <div class="settings-body">
        <div class="settings-section-title">Recipe directory</div>
        <div class="recipe-dir-wrap">
          <input type="text" id="recipe-dir-input" class="recipe-dir-input" placeholder="/path/to/recipe/directory">
          <div class="recipe-dir-hint">Path to the folder containing RECIPE.csv and SEQ_*.CSV files.</div>
        </div>
        <div class="settings-section-title">LPR material → step name</div>
        <div id="material-rows">
          <div style="color:var(--muted);font-size:.8rem;padding:12px 0;">Loading…</div>
        </div>
      </div>
      <div class="settings-footer">
        <span class="settings-save-status" id="settings-save-status"></span>
        <button class="btn-ghost" onclick="closeSettings()">Cancel</button>
        <button class="btn-save" onclick="saveSettings()">Save</button>
      </div>
    </div>
  </div>

  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-head">
        <div class="sidebar-title">
          <span>Recipes</span>
          <span class="count-badge" id="recipe-count">—</span>
        </div>
        <div class="sidebar-search">
          <svg class="search-icon" width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="8.5" cy="8.5" r="6"/><line x1="13" y1="13" x2="18" y2="18"/></svg>
          <input type="text" id="sidebar-search" placeholder="Filter recipes…" autocomplete="off" spellcheck="false">
        </div>
      </div>
      <div class="recipe-list" id="recipe-list"></div>
    </aside>

    <!-- Main -->
    <main class="main" id="main">
      <div class="empty-state" id="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        <p>Select a recipe to view its sequence</p>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
