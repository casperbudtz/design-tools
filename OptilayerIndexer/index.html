<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Optilayer Indexer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
</head>

<body>
  <header>
    <div class="header-left">
      <div class="header-title">
        <p>Multilayer film design search</p>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span class="update-status" id="update-status"></span>
      <button class="btn-update" id="btn-update" onclick="updateIndex()">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/><polyline points="15 12 15 6 9 6"/>
          <path d="M15 6A7 7 0 1 0 13.4 12.4"/><path d="M1 10A7 7 0 1 0 2.6 3.6"/>
        </svg>
        Update Index
      </button>
    </div>
  </header>

  <main>
    <div class="search-wrap">
      <span class="search-icon">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="8.5" cy="8.5" r="6"/><line x1="13" y1="13" x2="18" y2="18"/>
        </svg>
      </span>
      <input type="text" id="search" placeholder="Search by name, comment, or folder…" autocomplete="off" spellcheck="false">
      <button class="clear-btn" id="clear-btn" onclick="clearSearch()" title="Clear search">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="2" y1="2" x2="12" y2="12"/><line x1="12" y1="2" x2="2" y2="12"/>
        </svg>
      </button>
    </div>

    <div class="meta-bar">
      <span class="result-count" id="result-count"></span>
      <div class="loading-bar" id="loading-bar"></div>
      <label class="comment-toggle">
        <input type="checkbox" id="search-comments">
        <span>Search comments</span>
      </label>
    </div>

    <div class="table-card">
      <table>
        <colgroup>
          <col class="col-name">
          <col class="col-folder">
          <col class="col-comment">
          <col class="col-modified">
        </colgroup>
        <thead>
          <tr>
            <th>Name</th>
            <th>Folder</th>
            <th>Comment</th>
            <th>Modified</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div id="state-box" class="state-box" style="display:none;"></div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
